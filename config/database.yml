# PostgreSQL Database Configuration for Ruby on Rails
#
default: &default
  adapter: postgresql
  encoding: unicode
  # Configure Connection Pool size.
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Database connection credentials and host info
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "postgres" } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DB_PORT") { 5432 } %>

development:
  <<: *default
  database: store_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: store_test

# Production configuration. Credentials can be passed using environment variables
# in production (such as DATABASE_URL, or DB_USERNAME and DB_PASSWORD).
production:
  <<: *default
  database: <%= ENV.fetch("DB_DATABASE") { "store_production" } %>
  # If you are using DATABASE_URL (for example in Heroku or Render):
  # url: <%= ENV["DATABASE_URL"] %>
